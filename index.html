<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BFL Leaderboard</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    margin:20px;
}

.container{
    max-width:1600px;
    margin:auto;
}

h1{
    margin-bottom:20px;
}

.controls{
    display:flex;
    align-items:center;
    gap:20px;
    flex-wrap:wrap;
    margin-bottom:20px;
}

select{
    padding:10px;
    font-size:16px;
    min-width:300px;
}

#placementBox{
    font-size:18px;
    font-weight:bold;
    padding:10px 15px;
    background:white;
    border:1px solid #ccc;
    border-radius:4px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th{
    background:#222;
    color:white;
    padding:10px;
    text-align:left;
    position:sticky;
    top:0;
}

td{
    padding:8px;
    border:1px solid #ddd;
}

tr:nth-child(even){
    background:#fafafa;
}

.highlight{
    background:#fff39a !important;
    font-weight:bold;
}

#status{
    margin-bottom:15px;
    font-weight:bold;
}
    
.cutoff-row td{
    border-bottom:8px solid #ff4444 !important;
}

.cutoff-row{
    position:relative;
}

.cutoff-row::after{
    content:"TOP 80 CUTOFF";
    position:absolute;
    right:10px;
    bottom:-22px;
    background:#ff4444;
    color:white;
    font-weight:bold;
    padding:2px 10px;
    border-radius:4px;
    z-index:5;
}
    
</style>
</head>
<body>

<div class="container">

<h1>Live NA Leaderboard</h1>

<div class="controls">

    <select id="nameDropdown">
        <option value="">Choose a Name</option>
    </select>

    <div id="placementBox">
        Placement without Autoqualifiers:
        <span id="placementValue">-</span>
    </div>

</div>

<div id="status">Loading...</div>

<table id="liveTable">
    <thead></thead>
    <tbody></tbody>
</table>

</div>

<script>

const APPS_SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbxSe_fNTDb8jubFaUfxO-ewYPTl-11839rKX4vK8fPmXAg4rlPZydb_1-m9dQWUp7Tv/exec";

let headers = [];
let tableRows = [];

async function loadData(initialLoad = false){

    try{

        const response = await fetch(
            APPS_SCRIPT_URL + "?t=" + Date.now()
        );

        const data = await response.json();

        headers = data.headers || [];
        tableRows = data.rows || [];
        console.log("Headers:", headers);

        if(initialLoad){
            populateDropdown(data.names || []);
        }

        const selectedName = document.getElementById("nameDropdown").value;

        buildTable(selectedName);

        document.getElementById("status").innerHTML = "Last updated: " + new Date().toLocaleTimeString();

    }
    catch(error){
        console.error(error);
        document.getElementById("status").innerHTML = "Failed to load data.";
    }
}

function populateDropdown(names){

    const dropdown = document.getElementById("nameDropdown");

    dropdown.innerHTML = '<option value="">Select a Name</option>';

    names.sort();

    names.forEach(name => {

        const option = document.createElement("option");

        option.value = name;
        option.textContent = name;
        dropdown.appendChild(option);
    });
}

function buildTable(selectedName = ""){

    const thead = document.querySelector("#liveTable thead");
    const tbody = document.querySelector("#liveTable tbody");

    thead.innerHTML = "";
    tbody.innerHTML = "";

    if(!headers.length) return;

    const headerRow = document.createElement("tr");

    headers.forEach(header => {

        const th = document.createElement("th");
        th.textContent = header;
        headerRow.appendChild(th);
    });

    thead.appendChild(headerRow);

    const nameIndex =
        headers.findIndex(
            h => String(h).trim().toLowerCase() === "name"
        );

    const requirementIndex =
        headers.findIndex(
            h => String(h).toLowerCase().includes("820")
        );

    let selectedIndex = -1;
    let cutoffIndex = -1

    if(requirementIndex >= 0){

    let autoQualifiedCount = 0;
        for(let i = 0; i < tableRows.length; i++){
            const value = String(tableRows[i][requirementIndex] || "").trim().toLowerCase();
    
            if(value.includes("autoqualified")){
                autoQualifiedCount++;
            }
    
            const placementWithoutAQ =
                (i + 1) - autoQualifiedCount;
    
            if(placementWithoutAQ === 80){
                cutoffIndex = i;
                break;
            }
        }
    }


    
    if(selectedName){
        selectedIndex =tableRows.findIndex(row => String(row[nameIndex]).trim() === selectedName);
    }

    updatePlacement(selectedIndex, requirementIndex);

    tableRows.forEach((row,rowIndex)=>{

        if(selectedIndex >= 0){
            // Hide anyone more than 10 spots above
            if(rowIndex < selectedIndex - 10){
                return;
            }
        }

        const tr =
            document.createElement("tr");

        if(rowIndex === selectedIndex){
            tr.classList.add("highlight");
            tr.id = "selectedRow";
        }

        if(rowIndex === cutoffIndex){
            tr.classList.add("cutoff-row");
        }
        
        row.forEach(cell => {
            const td = document.createElement("td");
            td.textContent = cell ?? "";
            tr.appendChild(td);
        });
        tbody.appendChild(tr);
    });

    const selectedRow = document.getElementById("selectedRow");

    if(selectedRow){
        selectedRow.scrollIntoView({behavior:"smooth",block:"center"});
    }
}

function updatePlacement(selectedIndex, requirementIndex)
{
    const placementValue = document.getElementById("placementValue");

    if(requirementIndex < 0)
    {
        placementValue.textContent = "Selected Player MIA";
        return;
    }

        if(selectedIndex < 0)
    {
        placementValue.textContent = "Selected Column MIA";
        return;
    }

    let autoQualifiedAbove = 0;

    for(let i = 0; i < selectedIndex; i++)
    {
        const value =String(tableRows[i][requirementIndex] || "").trim().toLowerCase();

        if(value === "autoqualified"){
            autoQualifiedAbove++;
        }
    }

    const placement = selectedIndex - autoQualifiedAbove + 1;

    placementValue.textContent = placement;
}

document
.getElementById("nameDropdown")
.addEventListener(
    "change",
    function(){

        buildTable(this.value);
    }
);

loadData(true);

// Refresh every 30 seconds
setInterval(
    () => loadData(false),
    100000
);

</script>

</body>
</html>
