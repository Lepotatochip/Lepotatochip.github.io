<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BFL Leaderboard</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    margin:20px;
}

.container{
    max-width:1600px;
    margin:auto;
    padding-right:220px;
}

h1{
    margin-bottom:20px;
}

.page-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.page-header h1{
    margin:0;
}

.matches-button{
    padding:10px 20px;
    background:#222;
    color:white;
    border:none;
    border-radius:4px;
    cursor:pointer;
    font-size:16px;
}

.matches-button:hover{
    background:#444;
}

.controls{
    display:flex;
    align-items:center;
    gap:20px;
    flex-wrap:wrap;
    margin-bottom:20px;
}

select{
    padding:10px;
    font-size:16px;
    min-width:300px;
}

#placementBox{
    font-size:18px;
    font-weight:bold;
    padding:10px 15px;
    background:white;
    border:1px solid #ccc;
    border-radius:4px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th{
    background:#222;
    color:white;
    padding:10px;
    text-align:left;
    position:sticky;
    top:0;
}

td{
    padding:8px;
    border:1px solid #ddd;
}

tr:nth-child(even){
    background:#fafafa;
}

.highlight{
    background:#fff39a !important;
    font-weight:bold;
}

#status{
    margin-bottom:15px;
    font-weight:bold;
}
    
.cutoff-row td{
    border-bottom:4px solid #ff4444 !important;
}

.cutoff-row td:last-child{
    position:relative;
}


.cutoff-row td:last-child::before{
    content:"QUALIFICATION LINE";
    position:absolute;
    right:-190px;
    top:50%;
    transform:translateY(-50%);
    background:#ff4444;
    color:white;
    font-weight:bold;
    padding:6px 12px;
    border-radius:4px;
    white-space:nowrap;
    pointer-events:none;
}
    
</style>
</head>
<body>

<div class="container">

<div class="page-header">
    <h1>Live NA Leaderboard</h1>

    <button
        class="matches-button"
        onclick="window.location.href='Matches.html'">
        Matches
    </button>
</div>

<div class="controls">

    <select id="nameDropdown">
        <option value="">Choose a Name</option>
    </select>

    <div id="placementBox">
        Placement without Autoqualifiers:
        <span id="placementValue">-</span>
    </div>
    
    <div id="filterContainer" style="display:none;">
        <label>
            <input type="checkbox" id="attendanceFilter">
            Hide players below selected who are Not Attending or Eliminated
        </label>
    </div>
</div>

<div id="status">Loading...</div>

<table id="liveTable">
    <thead></thead>
    <tbody></tbody>
</table>

</div>

<script>

const APPS_SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbys_KaeyMx0v3etJgvwr9kcE16zRzeiwHBmrkeC55YCj2vJO3JpLQZ_521LcSA_lBkz/exec";

let headers = [];
let tableRows = [];

async function loadData(initialLoad = false){

    try{

        const response = await fetch(
            APPS_SCRIPT_URL + "?t=" + Date.now()
        );

        const data = await response.json();

        headers = data.headers || [];
        tableRows = data.rows || [];
        console.log("Headers:", headers);

        if(initialLoad){
            populateDropdown(data.names || []);
        }

        const selectedName = document.getElementById("nameDropdown").value;

        buildTable(selectedName);

        document.getElementById("status").innerHTML = "Last updated: " + new Date().toLocaleTimeString();

    }
    catch(error){
        console.error(error);
        document.getElementById("status").innerHTML = "Failed to load data.";
    }
}

function populateDropdown(names){

    const dropdown = document.getElementById("nameDropdown");

    dropdown.innerHTML = '<option value="">Select a Name</option>';

    names.sort();

    names.forEach(name => {

        const option = document.createElement("option");

        option.value = name;
        option.textContent = name;
        dropdown.appendChild(option);
    });
}

function buildTable(selectedName = ""){

    const thead = document.querySelector("#liveTable thead");
    const tbody = document.querySelector("#liveTable tbody");

    thead.innerHTML = "";
    tbody.innerHTML = "";

    if(!headers.length) return;

    const headerRow = document.createElement("tr");

    headers.forEach(header => {

        const th = document.createElement("th");
        th.textContent = header;
        headerRow.appendChild(th);
    });

    thead.appendChild(headerRow);

    const nameIndex = headers.findIndex(h => String(h).trim().toLowerCase() === "name");

    const requirementIndex = headers.findIndex(h => String(h).toLowerCase().includes("820"));
    const naicStatusIndex = headers.findIndex(h => String(h).trim().toLowerCase() === "naic status");
    
    let selectedIndex = -1;
    let cutoffIndex = -1;
    
    if(requirementIndex >= 0){
    
        let autoQualifiedCount = 0;
    
        for(let i = 0; i < tableRows.length; i++){
    
            const value =String(tableRows[i][requirementIndex] || "").trim().toLowerCase();
    
            if(value.includes("autoqualified")){
                autoQualifiedCount++;
            }
    
            const placementWithoutAQ = (i + 1) - autoQualifiedCount;
    
            if(placementWithoutAQ === 80){
                cutoffIndex = i;
                break;
            }
        }
    
        // Push the cutoff downward until the first
        // player below it is not Autoqualified
    
        while(cutoffIndex >= 0 && cutoffIndex < tableRows.length - 1){
            const nextPlayerStatus = String(tableRows[cutoffIndex + 1][requirementIndex] || "").trim().toLowerCase();
            if(
                !nextPlayerStatus.includes("autoqualified")
            ){
                break;
            }
            cutoffIndex++;
        }
    }
    
    if(selectedName){
        selectedIndex =tableRows.findIndex(row => String(row[nameIndex]).trim() === selectedName);
    }

    const filterContainer =
        document.getElementById("filterContainer");
    
    if(selectedIndex >= 0){
        filterContainer.style.display = "block";
    }
    else{
        filterContainer.style.display = "none";
        document.getElementById("attendanceFilter").checked = false;
    }
    
    updatePlacement(selectedIndex, requirementIndex);

    const visibleRows=[];
    let visibleCutoffPosition = -1;
    
    tableRows.forEach((row,rowIndex)=>{
    
        let shouldRender = true;
    
        // 10-above filter
    
        if(selectedIndex >= 0){
    
            if(rowIndex < selectedIndex - 10){
                shouldRender = false;
            }
        }
    
        // Attendance filter
    
        const filterEnabled =
            document.getElementById("attendanceFilter").checked;
    
        if(
            filterEnabled &&
            selectedIndex >= 0 &&
            rowIndex > selectedIndex &&
            naicStatusIndex >= 0
        ){
    
            const status =
                String(row[naicStatusIndex] || "" ).trim().toLowerCase();
    
            if(
                status === "not attending" ||
                status === "eliminated"
            ){
                shouldRender = false;
            }
        }
    
        if(shouldRender){
            visibleRows.push({row: row, originalIndex: rowIndex});
        }
    });

    for(let i = 0; i < visibleRows.length; i++){
        if(
            visibleRows[i].originalIndex > cutoffIndex
        ){
            visibleCutoffPosition = i - 1;
            break;
        }
    }

    if(visibleCutoffPosition === -1 && visibleRows.length > 0){
        visibleCutoffPosition = visibleRows.length - 1;
    }

    
    visibleRows.forEach((item, visibleIndex)=>{
    
        const row = item.row;
        const rowIndex = item.originalIndex;
    
        const tr = document.createElement("tr");
    
        if(rowIndex === selectedIndex){
    
            tr.classList.add("highlight");
            tr.id = "selectedRow";
        }
    
        const requirementValue =
            String(row[requirementIndex] || "").trim().toLowerCase();
    
        if(requirementValue.includes("autoqualified")){
            tr.classList.add("autoqualified-row");
        }

        if(visibleIndex === visibleCutoffPosition){
            tr.classList.add("cutoff-row");
        }
    
        row.forEach(cell=>{const td =document.createElement("td");
    
            td.textContent = cell ?? "";
            tr.appendChild(td);
        });
        tbody.appendChild(tr);
    });
}

    

    const selectedRow = document.getElementById("selectedRow");

    if(selectedRow){
        selectedRow.scrollIntoView({behavior:"smooth",block:"center"});
    }

function updatePlacement(selectedIndex, requirementIndex)
{
    const placementValue = document.getElementById("placementValue");

    if(requirementIndex < 0)
    {
        placementValue.textContent = "";
        return;
    }

        if(selectedIndex < 0)
    {
        placementValue.textContent = "";
        return;
    }

    let autoQualifiedAbove = 0;

    for(let i = 0; i < selectedIndex; i++)
    {
        const value =String(tableRows[i][requirementIndex] || "").trim().toLowerCase();

        if(value === "autoqualified"){
            autoQualifiedAbove++;
        }
    }

    const placement = selectedIndex - autoQualifiedAbove + 1;

    placementValue.textContent = placement;
}

document.getElementById("nameDropdown").addEventListener("change", function(){buildTable(this.value);});

document.getElementById("attendanceFilter").addEventListener("change", function(){const selected = document.getElementById("nameDropdown").value;buildTable(selected);});

loadData(true);

// Refresh every 30 seconds
setInterval(
    () => loadData(false),
    100000
);

</script>

</body>
</html>
