<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NAIC Standings</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:20px;
    background:#f5f5f5;
}

h1{
    margin-bottom:15px;
}

.controls{
    margin-bottom:20px;
}

select{
    padding:8px;
    font-size:16px;
    min-width:250px;
}

.tabs{
    margin-bottom:15px;
}

.tab-btn{
    padding:10px 20px;
    border:none;
    cursor:pointer;
    background:#ddd;
    margin-right:5px;
}

.tab-btn.active{
    background:#007bff;
    color:white;
}

.tab-content{
    display:none;
}

.tab-content.active{
    display:block;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th{
    background:#007bff;
    color:white;
    padding:10px;
}

td{
    padding:8px;
    border:1px solid #ccc;
}

.highlight{
    background:#fff3cd !important;
    font-weight:bold;
}
</style>
</head>
<body>

<h1>NAIC Live Standings</h1>

<div class="controls">
    <label>Select Player:</label>
    <br><br>
    <select id="playerSelect">
        <option>Loading...</option>
    </select>
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="showTab('standings')">
        Live Standings
    </button>

    <button class="tab-btn" onclick="showTab('requirements')">
        Requirements
    </button>
</div>

<div id="standings" class="tab-content active">
    <table id="standingsTable">
        <thead>
            <tr>
                <th>Name</th>
                <th>Wins</th>
                <th>Losses</th>
                <th>Adjusted Points</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<div id="requirements" class="tab-content">
    <p>Coming soon...</p>
</div>

<script>

const SHEET_ID =
"1SyrGXoPVh5YCHjX6H_GUjT86bQfpw0yzeYEDLs5qc8k";

const BFL_SHEET = "BFL List";
const LIVE_SHEET = "LIVE NAIC";
const REQ_SHEET = "NAIC Requirements";

let standingsData = [];

function showTab(tabId){

    document.querySelectorAll(".tab-content")
        .forEach(x => x.classList.remove("active"));

    document.querySelectorAll(".tab-btn")
        .forEach(x => x.classList.remove("active"));

    document.getElementById(tabId)
        .classList.add("active");

    event.target.classList.add("active");
}

async function fetchSheet(sheetName){

    const url =
        `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${encodeURIComponent(sheetName)}&tqx=out:json`;

    const response = await fetch(url);
    const text = await response.text();

    const json =
        JSON.parse(text.substring(47).slice(0,-2));

    return json.table.rows;
}

function getCell(row,index){

    return row.c[index]?.v ?? "";
}

async function loadData(){

    const [
        bflRows,
        liveRows,
        reqRows
    ] = await Promise.all([
        fetchSheet(BFL_SHEET),
        fetchSheet(LIVE_SHEET),
        fetchSheet(REQ_SHEET)
    ]);

    const liveMap = {};

    liveRows.forEach(row=>{

        const name = String(getCell(row,0)).trim();

        if(!name) return;

        liveMap[name] = {
            wins:getCell(row,2),
            losses:getCell(row,3),
            m:getCell(row,12)
        };
    });

    const reqMap = {};

    reqRows.forEach(row=>{

        const name = String(getCell(row,1)).trim();

        if(!name) return;

        reqMap[name] = {
            j:getCell(row,9),
            l:getCell(row,11)
        };
    });

    standingsData = [];

    bflRows.forEach(row=>{

        const name =
            String(getCell(row,6)).trim();

        if(!name) return;

        const basePoints =
            Number(getCell(row,3)) || 0;

        const baselineM =
            Number(getCell(row,12)) || 0;

        const live = liveMap[name];

        let wins = "N/A";
        let losses = "N/A";
        let adjustedPoints = basePoints;

        if(live){

            wins = live.wins ?? "N/A";
            losses = live.losses ?? "N/A";

            const liveM =
                Number(live.m) || 0;

            if(liveM > baselineM){

                adjustedPoints =
                    basePoints +
                    (liveM - baselineM);
            }
        }

        standingsData.push({
            name,
            wins,
            losses,
            adjustedPoints,
            requirements:
                reqMap[name] || null
        });

    });

    populateDropdown();
    renderStandings();
}

function populateDropdown(){

    const select =
        document.getElementById("playerSelect");

    select.innerHTML = "";

    standingsData
        .sort((a,b)=>a.name.localeCompare(b.name))
        .forEach(player=>{

            const option =
                document.createElement("option");

            option.value = player.name;
            option.textContent = player.name;

            select.appendChild(option);
        });

    select.addEventListener(
        "change",
        renderStandings
    );
}

function renderStandings(){

    const selected =
        document.getElementById("playerSelect")
        .value;

    const tbody =
        document.querySelector(
            "#standingsTable tbody"
        );

    tbody.innerHTML = "";

    standingsData.forEach(player=>{

        const tr =
            document.createElement("tr");

        if(player.name === selected){
            tr.classList.add("highlight");
        }

        tr.innerHTML = `
            <td>${player.name}</td>
            <td>${player.wins}</td>
            <td>${player.losses}</td>
            <td>${player.adjustedPoints}</td>
        `;

        tbody.appendChild(tr);
    });
}

loadData();

</script>

</body>
</html>
